<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>რეგისტრაცია - HairCare Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 👑 თხელი ნავბარი, ზუსტად შენი სურათების მიხედვით */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            padding: 0 30px;
            background-color: #111111;
            border-bottom: 2px solid #c5a059; /* ოქროსფერი ხაზი */
        }

        .logo-box {
            display: flex;
            align-items: center;
        }

        .logo-box img {
            height: 35px;
            background-color: white;
            padding: 2px 8px;
            border-radius: 4px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: #c5a059;
            font-size: 15px;
            font-weight: 500;
            transition: 0.2s;
        }

        nav a:hover, nav a.active {
            color: #ffffff;
        }

        /* 🔒 რეგისტრაციის ლამაზი ფორმა ცენტრში */
        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            background: #141414;
            padding: 40px 35px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #c5a059;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .auth-container h2 {
            font-weight: 700;
            margin-bottom: 25px;
            color: #ffffff;
            font-size: 26px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            color: #c5a059;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background-color: #1d1d1d;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #c5a059;
            background-color: #222;
            outline: none;
        }

        /* 🚀 ოქროსფერი ღილაკი რეგისტრაციისთვის */
        .btn-gold-submit {
            background-color: #c5a059;
            color: #000000;
            border: none;
            padding: 14px;
            width: 100%;
            font-weight: 700;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 10px;
        }

        .btn-gold-submit:hover {
            background-color: #e2ba6e;
            transform: translateY(-1px);
        }

        footer {
            padding: 30px;
            text-align: center;
            color: #444;
            font-size: 13px;
            margin-top: 50px;
        }
    </style>
</head>

    <div class="auth-container">
        <h2>რეგისტრაცია 🚀</h2>

        <form id="regForm">
            <div class="form-group">
                <label for="email">ელ. ფოსტა:</label>
                <input type="email" id="email" placeholder="შეიყვანეთ ელ.ფოსტა" required>
            </div>

            <div class="form-group">
                <label for="password">პაროლი:</label>
                <input type="password" id="password" placeholder="მოიფიქრეთ პაროლი" required>
            </div>

            <button type="submit" class="btn-gold-submit">რეგისტრაცია 🚀</button>
        </form>
    </div>

    <script>
        document.getElementById("regForm").addEventListener("submit", function(e) {
            e.preventDefault(); // აჩერებს გვერდის გადატვირთვას

            // 1. ვიღებთ იუზერის შეყვანილ ელ-ფოსტას
            let userEmailValue = document.getElementById("email").value;

            // 2. ბრაუზერში ვინახავთ სტატუსს და ემეილს
            localStorage.setItem("isRegistered", "true");
            localStorage.setItem("userEmail", userEmailValue);

            // 3. ვქმნით ცარიელ მასივს პროდუქტებისთვის, რომ პროფილიდან ❌-ები სწორად გამოჩნდეს
            localStorage.setItem("myProducts", JSON.stringify([]));

            // 4. შეტყობინება
            alert('მოგესალმებით HairCare Hub-ში! ✨');

            // 5. ავტომატურად გადაგვიყვანოს მთავარ გვერდზე
            window.location.href = "index.html";
        });
    </script>
