<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>შეკვეთა მიღებულია</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .success-box {
            text-align: center;
            border: 1px solid #c5a059;
            padding: 40px;
            border-radius: 15px;
            background: #1a1a1a;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2);
        }
        .btn-gold {
            background-color: #c5a059;
            color: #000;
            font-weight: bold;
            border: none;
            padding: 10px 30px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-gold:hover {
            background-color: #a6854a;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="success-box">
    <h2 style="color: #c5a059; font-weight: bold; margin-bottom: 20px;">შესყიდვა წარმატებით მოხერხდა!</h2>
    <p class="text-secondary">თქვენი შეკვეთა დამუშავებულია. პროდუქტი მოვა 2-3 დღეში.</p>
    <a href="index.html" class="btn btn-gold mt-3">მთავარზე დაბრუნება</a>
</div>

</body>
</html>
<link rel="stylesheet" href="style.css">
