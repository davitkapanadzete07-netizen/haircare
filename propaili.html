    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 👑 პრემიუმ ნავბარი */
        .navbar-custom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        .navbar-custom ul {
            display: flex;
            list-style: none;
            gap: 20px;
            padding: 0;
            margin: 0;
            align-items: center;
        }
        .navbar-custom a {
            text-decoration: none;
            color: gold;
            font-weight: 500;
        }

        /* 👤 პროფილის მთავარი კონტეინერი */
        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            background: #141414;
            padding: 35px;
            border-radius: 12px;
            color: white;
            border: 1px solid #c5a059;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .profile-container h2 {
            border-bottom: 2px solid #c5a059;
            padding-bottom: 10px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .user-info p { font-size: 1.1em; margin: 12px 0; color: #ccc; }
        .user-info span { color: #c5a059; font-weight: bold; }

        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 10px;
        }
        .logout-btn:hover { background-color: #bd2130; }

        /* 🛍️ პროდუქტების ფანჯარა */
        .products-window {
            background: #0b0b0b;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #222;
            margin-top: 30px;
        }
        .products-window h3 {
            font-size: 18px;
            color: #c5a059;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .product-status-item {
            background: #141414;
            padding: 14px;
            margin: 10px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid #333;
            transition: 0.3s;
        }
        .product-status-item.owned {
            border-left: 4px solid #4ade80;
            background: #141e17;
        }
    </style>
</head>

    <main>
        <div class="profile-container">
            <h2>👤 ჩემი პროფილი</h2>
            <div class="user-info">
                <p><strong>მომხმარებელი:</strong> <span id="profileUsername">სტუმარი</span></p>
                <p><strong>ელ-ფოსტა:</strong> <span id="profileEmail">guest@example.com</span></p>
                <button class="logout-btn" onclick="logoutUser()">სისტემიდან გამოსვლა 🚪</button>
            </div>

            <div class="products-window">
                <h3>🛍️ თმის მოვლის პროდუქტების სტატუსი</h3>
                <div id="productsList">
                    <div class="product-status-item" id="p-clay"><span>Based hair clay</span><span id="s-clay">❌ არ გაქვთ</span></div>
                    <div class="product-status-item" id="p-salt"><span>Based sea salt spray</span><span id="s-salt">❌ არ გაქვთ</span></div>
                    <div class="product-status-item" id="p-powder"><span>Based texture powder</span><span id="s-powder">❌ არ გაქვთ</span></div>
                    <div class="product-status-item" id="p-oil"><span>Beard oil</span><span id="s-oil">❌ არ გაქვთ</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        if (!localStorage.getItem("isRegistered")) {
            alert("თქვენ არ ხართ ავტორიზებული! გთხოვთ გაიაროთ რეგისტრაცია.");
            window.location.href = "registracia.html";
        }

        let userEmail = localStorage.getItem("userEmail") || "user@example.com";
        document.getElementById("profileUsername").innerText = userEmail.split('@')[0];
        document.getElementById("profileEmail").innerText = userEmail;

        let myProducts = JSON.parse(localStorage.getItem("myProducts")) || [];

        function showAsOwned(prodId) {
            let row = document.getElementById("p-" + prodId);
            let status = document.getElementById("s-" + prodId);
            if(row && status) {
                row.classList.add("owned");
                status.innerText = "✅ შეძენილია";
                status.style.color = "#4ade80";
                status.style.fontWeight = "bold";
            }
        }

        myProducts.forEach(product => {
            if(product === "hair clay") showAsOwned("clay");
            if(product === "sea salt spray") showAsOwned("salt");
            if(product === "texture powder") showAsOwned("powder");
            if(product === "beard oil") showAsOwned("oil");
        });

        function logoutUser() {
            if(confirm("ნამდვილად გსურთ სისტემიდან გამოსვლა?")) {
                localStorage.clear();
                alert("თქვენ გამოხვედით სისტემიდან!");
                window.location.href = "index.html";
            }
        }
